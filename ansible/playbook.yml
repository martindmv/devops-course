---
- hosts: all
  gather_facts: true
  become: true
  
  # Cette variable indique à Ansible d'utiliser l'environnement virtuel Python
  # où l'on a installé la librairie 'docker' à l'étape précédente.

  vars_files:
    - vars.yml

  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python3

  roles:
    - docker
    - network
    - database
    - app
    - proxy